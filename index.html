<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS | Orquestrador de Governança IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .layer-active {
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.15) 0%, transparent 100%);
            border-left: 4px solid #38bdf8; color: #fff; transform: scale(1.02); transition: all 0.3s ease;
        }
        .layer-idle { border-left: 4px solid transparent; color: #94a3b8; transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .log-enter { animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 h-screen overflow-hidden flex selection:bg-blue-500/30">

    <aside class="w-72 glass flex flex-col h-full z-20 shadow-2xl shadow-black">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-emerald-500 flex items-center justify-center shadow-lg">
                    <i class="fas fa-project-diagram text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-white tracking-wide">PMO AI Core</h1>
                    <p class="text-[10px] text-emerald-400 font-semibold uppercase tracking-widest">Núcleo IA Framework</p>
                </div>
            </div>
        </div>
        <div class="p-4 flex-1 overflow-y-auto space-y-1" id="layers-container"></div>
        <div class="p-4 border-t border-slate-800">
            <button onclick="downloadDossie()" class="w-full py-2.5 bg-slate-800 hover:bg-slate-700 text-xs font-semibold rounded-lg transition-colors flex items-center justify-center gap-2 text-slate-300">
                <i class="fas fa-file-download"></i> Baixar Dossiê (Auditoria)
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
        <div class="absolute inset-0 bg-[#020617]/95 z-0"></div>
        
        <header class="h-20 glass border-b border-slate-800 flex items-center justify-between px-8 z-10">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Caminho de Orquestração (Nó Ativo)</span>
                <span id="active-route" class="font-mono text-xs text-blue-400 bg-blue-900/10 px-3 py-1.5 rounded border border-blue-900/30 flex items-center gap-2">
                    <i class="fas fa-code-branch"></i> Aguardando Comando...
                </span>
            </div>
            <div class="flex gap-8">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Baseline</span>
                    <span id="kpi-baseline" class="font-bold text-emerald-400 text-sm px-2.5 py-1 rounded bg-emerald-900/20 border border-emerald-500/20 flex items-center gap-1.5"><i class="fas fa-folder-open text-xs"></i> ABERTA</span>
                </div>
                <div class="flex flex-col items-end border-l border-slate-800 pl-8">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Custo Estimado</span>
                    <span id="kpi-custo" class="font-bold text-slate-200 text-lg tabular-nums transition-colors duration-500">R$ 0,00</span>
                </div>
                <div class="flex flex-col items-end border-l border-slate-800 pl-8">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-1">Status de Risco</span>
                    <span id="kpi-risco" class="font-bold text-slate-400 text-lg transition-colors duration-500">N/A</span>
                </div>
            </div>
        </header>

        <div id="log-feed" class="flex-1 p-6 overflow-y-auto space-y-4 pb-56 z-10 scroll-smooth"></div>

        <div class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-[#020617] via-[#020617]/95 to-transparent z-20">
            <div class="max-w-5xl mx-auto space-y-4">
                
                <div class="flex gap-3">
                    <input type="text" id="userInput" placeholder="Ex: Iniciar projeto... Solicito mudança... Destravar baseline..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors text-slate-200 shadow-inner">
                    <button id="btnSend" onclick="handleInput()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold text-sm transition-colors shadow-lg shadow-blue-900/20 flex items-center gap-2">
                        Enviar <i class="fas fa-paper-plane"></i>
                    </button>
                </div>

                <div class="grid grid-cols-4 gap-3">
                    <button onclick="triggerScenario(0)" class="action-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg py-2.5 px-3 text-[11px] font-semibold text-slate-300 transition-all text-left flex items-center justify-between group disabled:opacity-50">
                        <span class="flex items-center gap-1.5"><i class="fas fa-play text-emerald-500"></i> 1. Atalho: Iniciar Projeto</span>
                    </button>
                    <button onclick="triggerScenario(1)" class="action-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg py-2.5 px-3 text-[11px] font-semibold text-slate-300 transition-all text-left flex items-center justify-between group disabled:opacity-50">
                        <span class="flex items-center gap-1.5"><i class="fas fa-exclamation-circle text-amber-500"></i> 2. Mudar Escopo (Cen. 5)</span>
                    </button>
                    <button onclick="triggerScenario(2)" class="action-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg py-2.5 px-3 text-[11px] font-semibold text-slate-300 transition-all text-left flex items-center justify-between group disabled:opacity-50">
                        <span class="flex items-center gap-1.5"><i class="fas fa-users-cog text-rose-500"></i> 3. Acionar MASAI (LGPD)</span>
                    </button>
                    <button onclick="triggerScenario(3)" class="action-btn bg-blue-900 hover:bg-blue-800 border border-blue-700 rounded-lg py-2.5 px-3 text-[11px] font-semibold text-white transition-all text-left flex items-center justify-between group disabled:opacity-50">
                        <span class="flex items-center gap-1.5"><i class="fas fa-plug text-blue-300"></i> 4. Integrar MCP (JIRA)</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const layers = [
            { id: 1, name: 'View / Apresentação', icon: 'fa-desktop' },
            { id: 2, name: 'Controller / Roteamento', icon: 'fa-route' },
            { id: 3, name: 'Governança (Núcleo)', icon: 'fa-gavel' },
            { id: 4, name: 'Coordenação / Ciclo', icon: 'fa-sitemap' },
            { id: 5, name: 'Funcional (MASAI)', icon: 'fa-users-cog' },
            { id: 6, name: 'Modelos / Memória', icon: 'fa-database' },
            { id: 7, name: 'Ferramentas / MCP', icon: 'fa-plug' }
        ];

        let logHistory = [];
        let isProcessing = false;
        
        // Máquina de Estado da Conversa
        let setupStep = 0;
        let scopeObjective = "";
        let awaitingUnlock = false;

        const layersContainer = document.getElementById('layers-container');
        layers.forEach(l => {
            layersContainer.innerHTML += `
                <div id="layer-${l.id}" class="layer-idle px-4 py-3 rounded-r-lg flex items-center gap-3">
                    <i class="fas ${l.icon} text-sm opacity-70 w-4 text-center"></i>
                    <span class="text-xs font-semibold tracking-wide">${l.id}. ${l.name}</span>
                </div>
            `;
        });

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function activateLayer(id, routeText) {
            document.querySelectorAll('[id^="layer-"]').forEach(el => {
                el.classList.remove('layer-active');
                el.classList.add('layer-idle');
            });
            if(id) {
                document.getElementById(`layer-${id}`).classList.remove('layer-idle');
                document.getElementById(`layer-${id}`).classList.add('layer-active');
            }
            if(routeText) document.getElementById('active-route').innerHTML = `<i class="fas fa-code-branch"></i> ${routeText}`;
        }

        function setProcessingState(state) {
            isProcessing = state;
            document.querySelectorAll('.action-btn, #btnSend, #userInput').forEach(el => el.disabled = state);
            if(state) document.getElementById('log-feed').innerHTML += `<div id="typing" class="flex gap-1 p-4 pl-11"><div class="w-2 h-2 bg-slate-500 rounded-full typing-dot"></div><div class="w-2 h-2 bg-slate-500 rounded-full typing-dot"></div><div class="w-2 h-2 bg-slate-500 rounded-full typing-dot"></div></div>`;
            else {
                const typing = document.getElementById('typing');
                if(typing) typing.remove();
            }
            scrollToBottom();
        }

        function scrollToBottom() {
            const feed = document.getElementById('log-feed');
            feed.scrollTop = feed.scrollHeight;
        }

        async function addLog(sender, role, message, type = 'info') {
            const typing = document.getElementById('typing');
            if(typing) typing.remove();

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            let style = 'bg-slate-800/50 border-slate-700/50 text-slate-300';
            let icon = 'fa-robot text-blue-400';

            if (type === 'user') { style = 'bg-blue-900/20 border-blue-800/30 text-blue-100 ml-12'; icon = 'fa-user text-blue-400'; }
            if (type === 'gov') { style = 'bg-amber-900/20 border-amber-500/30 text-amber-100'; icon = 'fa-gavel text-amber-500'; }
            if (type === 'error') { style = 'bg-rose-900/20 border-rose-500/30 text-rose-100'; icon = 'fa-shield-alt text-rose-500'; }
            if (type === 'success') { style = 'bg-emerald-900/20 border-emerald-500/30 text-emerald-100'; icon = 'fa-check-circle text-emerald-500'; }
            if (type === 'mcp') { style = 'bg-indigo-900/20 border-indigo-500/30 text-indigo-100'; icon = 'fa-plug text-indigo-400'; }
            if (type === 'chat') { style = 'bg-slate-700/50 border-slate-500/50 text-emerald-200'; icon = 'fa-comment-dots text-emerald-400'; }

            const logHTML = `
                <div class="p-4 rounded-xl border ${style} backdrop-blur-sm log-enter relative group">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <i class="fas ${icon} text-lg"></i>
                            <div>
                                <h3 class="font-bold text-sm leading-none">${sender}</h3>
                                <span class="text-[10px] text-slate-400 uppercase tracking-wider">${role}</span>
                            </div>
                        </div>
                        <span class="text-[10px] font-mono text-slate-500 bg-black/20 px-2 py-1 rounded">${time}</span>
                    </div>
                    <p class="text-sm leading-relaxed text-slate-300 pl-7">${message}</p>
                </div>
            `;
            document.getElementById('log-feed').innerHTML += logHTML;
            logHistory.push(`[${time}] ${sender} (${role}): ${message}`);
            scrollToBottom();
            
            if(isProcessing && type !== 'user') {
                document.getElementById('log-feed').innerHTML += `<div id="typing" class="flex gap-1 p-4 pl-11"><div class="w-2 h-2 bg-slate-600 rounded-full typing-dot"></div><div class="w-2 h-2 bg-slate-600 rounded-full typing-dot"></div><div class="w-2 h-2 bg-slate-600 rounded-full typing-dot"></div></div>`;
                scrollToBottom();
            }
        }

        // LÓGICA CONVERSACIONAL E PERGUNTAS DO ESCOPO
        async function handleInput() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text || isProcessing) return;
            
            input.value = '';
            setProcessingState(true);
            const textLower = text.toLowerCase();

            // Etapa 1: Respondendo qual é o objetivo do projeto
            if (setupStep === 1) {
                await addLog('Gerente de Projetos', 'Camada 1 - View', text, 'user');
                scopeObjective = text;
                await sleep(1500);
                activateLayer(4, 'Coordenação');
                await addLog('Coordenador de Planejamento', 'Camada 4 - Coordenação', 'Entendido! Agora, para fecharmos a Linha de Base, me informe: Qual é o orçamento estimado e o prazo deste projeto?', 'chat');
                setupStep = 2;
                setProcessingState(false);
                return;
            }

            // Etapa 2: Respondendo orçamento e prazo (Aí sim o sistema trava a baseline)
            if (setupStep === 2) {
                await addLog('Gerente de Projetos', 'Camada 1 - View', text, 'user');
                await flowInitScope(scopeObjective, text);
                setupStep = 0;
                setProcessingState(false);
                return;
            }

            // Confirmação para Destravar Baseline
            if (awaitingUnlock) {
                await addLog('Gerente de Projetos', 'Camada 1 - View', text, 'user');
                if (textLower.includes('sim') || textLower.includes('autorizo')) {
                    await flowDoUnlock();
                } else {
                    activateLayer(2, 'Controller');
                    await addLog('Controller', 'Camada 2 - Roteamento', 'Operação de destravamento cancelada por falta de confirmação formal.', 'info');
                }
                awaitingUnlock = false;
                setProcessingState(false);
                return;
            }

            // Mapeamento de Comandos Livres
            if (textLower.includes('destravar') || textLower.includes('abrir a baseline')) {
                await addLog('Gerente de Projetos', 'Camada 1 - View', text, 'user');
                await flowAskUnlock();
            } 
            else if (textLower.includes('mudança') || textLower.includes('2fa') || textLower.includes('adicionar') || textLower.includes('cliente quer')) {
                await flowGovernanceBlock(text);
            } 
            else if (textLower.includes('aprova') || textLower.includes('agente') || textLower.includes('contrato') || textLower.includes('sim')) {
                await flowMasaiConflict(text);
            } 
            else if (textLower.includes('integrar') || textLower.includes('jira') || textLower.includes('mcp') || textLower.includes('e-mail')) {
                await flowMcpIntegration(text);
            } 
            else if (textLower.includes('iniciar') || textLower.includes('projeto') || textLower.includes('criar')) {
                await addLog('Gerente de Projetos', 'Camada 1 - View', text, 'user');
                await flowStartQuestions(); // CHAMA AS PERGUNTAS DE LEVANTAMENTO!
            } 
            else {
                await addLog('Gerente de Projetos', 'Camada 1 - View', text, 'user');
                await sleep(1000);
                activateLayer(2, 'Controller');
                await addLog('Controller', 'Camada 2 - Roteamento', 'Comando não mapeado. Você pode tentar: "Iniciar projeto", "Solicitar mudança", "Destravar baseline" ou "Integrar MCP".', 'error');
            }
            
            setProcessingState(false);
            activateLayer(0, 'Aguardando Comando...');
        }

        async function triggerScenario(num) {
            if (isProcessing) return;
            setProcessingState(true);
            
            if(num === 0) {
                await addLog('Gerente de Projetos', 'Camada 1 - View', 'Quero iniciar um projeto!', 'user');
                await flowStartQuestions();
            }
            if(num === 1) await flowGovernanceBlock('Change Request: O cliente exigiu a adição de um módulo de Autenticação 2FA urgente.');
            if(num === 2) await flowMasaiConflict('Contrato de alteração aprovado. Acionem os agentes construtores e validadores.');
            if(num === 3) await flowMcpIntegration('Dossiê validado. Aprovo o Go-Live e o encerramento do pacote.');

            setProcessingState(false);
            activateLayer(0, 'Aguardando Comando...');
        }

        // FLUXO DE PERGUNTAS INICIAIS
        async function flowStartQuestions() {
            activateLayer(4, 'Coordenação');
            await sleep(1500);
            await addLog('Coordenador de Planejamento', 'Camada 4 - Coordenação', 'Olá! Para criarmos o Termo de Abertura (TAP) com segurança, vou precisar de alguns dados. **Qual é o objetivo principal e os entregáveis esperados deste projeto?**', 'chat');
            setupStep = 1; // Coloca o chat no estado de esperar o objetivo
        }

        // FLUXO DE COMPILAÇÃO E TRAVA DA BASELINE
        async function flowInitScope(objective, resources) {
            activateLayer(4, 'Coordenação ➔ Governança');
            await sleep(2000);
            await addLog('Coordenador de Planejamento', 'Camada 4 - Coordenação', `Compilando o Projeto...\n- Objetivo: ${objective}\n- Restrições: ${resources}\nEnviando o documento formal para aprovação do Núcleo de Governança.`, 'info');
            
            await sleep(2000);
            activateLayer(3, 'Governança');
            await addLog('Orquestrador de Governança', 'Camada 3 - Núcleo', 'Escopo inicial validado e homologado. A partir deste momento, a BASELINE ESTÁ TRAVADA. Nenhuma inteligência artificial autônoma tem permissão para alterar os requisitos do projeto.', 'gov');
            
            const baseline = document.getElementById('kpi-baseline');
            baseline.innerHTML = '<i class="fas fa-lock text-xs"></i> TRAVADA';
            baseline.className = 'font-bold text-rose-400 text-sm px-2.5 py-1 rounded bg-rose-900/20 border border-rose-500/20 flex items-center gap-1.5 transition-all';
            
            document.getElementById('kpi-custo').innerText = 'R$ 120.000,00';
            document.getElementById('kpi-risco').innerText = 'Baixo';
            document.getElementById('kpi-risco').className = 'font-bold text-emerald-400 text-lg transition-colors duration-500';
            
            await sleep(1000);
        }

        async function flowAskUnlock() {
            const baseStatus = document.getElementById('kpi-baseline').innerText;
            if(!baseStatus.includes('TRAVADA')) {
                activateLayer(3, 'Governança');
                await sleep(1000);
                await addLog('Orquestrador de Governança', 'Camada 3 - Núcleo', 'A Baseline já se encontra ABERTA. Nenhuma ação necessária.', 'info');
                return;
            }

            activateLayer(3, 'View ➔ Controller ➔ Governança');
            await sleep(1500);
            await addLog('Orquestrador de Governança', 'Camada 3 - Núcleo', '⚠️ ATENÇÃO: Destravar a Baseline exige justificativa formal. Você confirma e autoriza a abertura do projeto para alterações da equipe de agentes? (Digite "sim" ou "não")', 'warning');
            awaitingUnlock = true;
        }

        async function flowDoUnlock() {
            activateLayer(3, 'Governança');
            await sleep(1000);
            await addLog('Orquestrador de Governança', 'Camada 3 - Núcleo', '🔓 Baseline destravada por autoridade humana. A equipe está liberada para modificar o escopo do projeto.', 'success');
            
            const baseline = document.getElementById('kpi-baseline');
            baseline.innerHTML = '<i class="fas fa-folder-open text-xs"></i> ABERTA (Exceção)';
            baseline.className = 'font-bold text-amber-400 text-sm px-2.5 py-1 rounded bg-amber-900/20 border border-amber-500/20 flex items-center gap-1.5 transition-all';
        }

        async function flowGovernanceBlock(customText) {
            await addLog('Gerente de Projetos', 'Camada 1 - View', customText, 'user');
            activateLayer(1, 'View ➔ Controller');
            await sleep(1500);

            const baseStatus = document.getElementById('kpi-baseline').innerText;
            if(baseStatus.includes('ABERTA')) {
                 activateLayer(5, 'Coordenação ➔ Funcional (MASAI)');
                 await addLog('Agente de Escopo', 'Camada 5 - Construtor', 'Como a Baseline está ABERTA, estou gerando o código e alterando o projeto automaticamente conforme solicitado.', 'info');
                 return;
            }

            activateLayer(3, 'View ➔ Controller ➔ Governança');
            await addLog('Orquestrador de Governança', 'Camada 3 - Núcleo', '⚠️ ACESSO NEGADO. A Linha de Base já foi travada na etapa anterior. IA bloqueada de gerar código autônomo (One Shot Hero). Exigido novo Contrato de Execução para avaliar impacto financeiro.', 'error');
            
            document.getElementById('kpi-custo').innerText = 'R$ 158.500,00';
            document.getElementById('kpi-custo').classList.replace('text-slate-200', 'text-amber-400');
            await sleep(1000);
        }

        async function flowMasaiConflict(customText) {
            await addLog('Gerente de Projetos', 'Camada 1 - View', customText, 'user');
            activateLayer(4, 'Governança ➔ Coordenação');
            await sleep(1000);

            activateLayer(5, 'Coordenação ➔ Funcional (MASAI)');
            await addLog('Agente de Escopo', 'Camada 5 - Construtor', 'Construindo código do módulo 2FA e banco de dados. Solução enviada para revisão dos sensores.', 'info');
            await sleep(2000);

            await addLog('Agente de Auditoria/Risco', 'Camada 5 - Sensor Validador', '🛑 [FAIL - VIOLAÇÃO LGPD] O Agente de Escopo salvou o IP do usuário em texto plano. Correção imediata exigida antes de prosseguir.', 'error');
            document.getElementById('kpi-risco').innerText = 'ALTO';
            document.getElementById('kpi-risco').classList.replace('text-emerald-400', 'text-rose-400');
            await sleep(2500);

            await addLog('Agente de Escopo', 'Camada 5 - Construtor', 'Refatorando código: Aplicando Hash Criptográfico (SHA-256) nos registros.', 'info');
            await sleep(2000);

            await addLog('Agente de Auditoria/Risco', 'Camada 5 - Sensor Validador', '✅ [PASS] Autocorreção validada (Harness Engineering). Risco mitigado. Dossiê liberado para avaliação humana.', 'success');
            document.getElementById('kpi-risco').innerText = 'Mitigado';
            document.getElementById('kpi-risco').classList.replace('text-rose-400', 'text-emerald-400');
            await sleep(1000);
        }

        async function flowMcpIntegration(customText) {
            await addLog('Patrocinador', 'Camada 1 - View', customText, 'user');
            activateLayer(2, 'View ➔ Controller');
            await sleep(1000);

            activateLayer(7, 'Controller ➔ Ferramentas (MCP)');
            await addLog('Protocolo MCP', 'Camada 7 - Interoperabilidade', 'Autorização recebida. Conectando aos sistemas corporativos para evitar trabalho manual...', 'mcp');
            await sleep(2000);

            await addLog('MCP / JIRA Adapter', 'Integração de Ferramenta', 'Issue atualizada para "DONE". Tempo registrado (4h).', 'mcp');
            await sleep(1500);

            await addLog('MCP / Outlook Adapter', 'Integração de Ferramenta', 'E-mail oficial com as notas de lançamento disparado para todos os 14 stakeholders.', 'mcp');
            
            const base = document.getElementById('kpi-baseline');
            base.innerHTML = '<i class="fas fa-check-double text-xs"></i> ATUALIZADA';
            base.className = 'font-bold text-emerald-400 text-sm px-2.5 py-1 rounded bg-emerald-900/20 border border-emerald-500/20 flex items-center gap-1.5 transition-all';
            await sleep(500);
        }

        function downloadDossie() {
            if(logHistory.length === 0) return alert("Não há registros de auditoria ainda.");
            const content = "DOSSIÊ DE AUDITORIA - NÚCLEO IA\n===============================\n\n" + logHistory.join('\n\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Trilha_de_Auditoria.txt';
            a.click();
